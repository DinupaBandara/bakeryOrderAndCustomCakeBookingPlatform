spring.application.name=BakeNest

# 1. Database Connection & Auto-Creation
# The "?createDatabaseIfNotExist=true" is the magic command for MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/bakenest?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. JPA & Hibernate Settings (For creating tables)
# "update" will create tables if they don't exist, and update them if you change your entities
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect