<div id="sidebarOverlay" onclick="toggleSidebar()"></div>

<aside th:fragment="admin-sidebar" class="sidebar" id="sidebar">
    <script>
        // Inline check to prevent UI flickering
        if (localStorage.getItem('sidebar-collapsed') === 'true') {
            document.getElementById('sidebar').classList.add('collapsed');
        }
    </script>

    <div class="sidebar-header">
        <div class="header-main">
            <h2 class="logo-text">BakeNest</h2>
            <!-- Toggle Button aligned with Title -->
            <button class="toggle-btn" onclick="toggleSidebar()">
                <span class="material-symbols-outlined" id="toggleIcon">menu_open</span>
            </button>
        </div>
        <span class="badge-admin">Admin Panel</span>
    </div>

    <nav class="sidebar-nav">
        <a th:href="@{/admin/dashboard}" class="nav-item" th:classappend="${activePage == 'dashboard'} ? 'active' : ''">
            <span class="material-symbols-outlined">dashboard</span>
            <span class="nav-text">Overview</span>
        </a>
        <a href="#" class="nav-item">
            <span class="material-symbols-outlined">delivery_truck_speed</span>
            <span class="nav-text">Orders</span>
        </a>
        <a th:href="@{/admin/product}" class="nav-item" th:classappend="${activePage == 'products'} ? 'active' : ''">
            <span class="material-symbols-outlined">bakery_dining</span>
            <span class="nav-text">Products</span>
        </a>
        <a th:href="@{/admin/customers}" class="nav-item" th:classappend="${activePage == 'customers'} ? 'active' : ''">
            <span class="material-symbols-outlined">group</span>
            <span class="nav-text">Customers</span>
        </a>
        <!-- Only show if the loggedUser is actually the Super Admin -->
        <a th:href="@{/admin/adminManagement}" class="nav-item" th:if="${session.loggedUser != null and session.loggedUser.superAdmin}" th:classappend="${activePage == 'management'} ? 'active' : ''">
            <span class="material-symbols-outlined">admin_panel_settings</span>
            <span class="nav-text">Admin Management</span>
        </a>

        <a th:href="@{/admin/profile}" class="nav-item" th:classappend="${activePage == 'profile'} ? 'active' : ''">
            <span class="material-symbols-outlined">account_circle</span>
            <span class="nav-text">Profile</span>
        </a>
    </nav>

    <div class="sidebar-footer">
        <form th:if="${session.loggedUser != null}" th:action="@{/auth/logout}" method="post">
            <button type="submit" class="logout-btn">
                <span class="material-symbols-outlined">logout</span>
                <span class="btn-text">Logout</span>
            </button>
        </form>
    </div>
</aside>
