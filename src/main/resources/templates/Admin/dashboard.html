<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | The Flourished Hearth</title>
    <link rel="stylesheet" th:href="@{/css/admin/dashboard.css}">
    <link rel="stylesheet" th:href="@{/css/admin/fragments/sidebar.css}">

    <script th:src="@{/js/admin/sidebar.js}" defer></script>
    <script th:src="@{/js/admin/notification.js}" defer></script>

</head>
<body class="admin-body">

<div th:replace="~{Admin/fragments/sidebar :: admin-sidebar}"></div>

<main class="main-content">
    <header class="top-bar">
        <div class="welcome-msg">
            <h1>Welcome Back, <span th:text="${session.loggedUser.name}">Owner</span></h1>
            <p>Here is what's happening at the bakery today.</p>
        </div>
    </header>

    <div class="stats-grid">
        <div class="stat-card">
            <h3>Total Orders</h3>
            <p class="stat-number">124</p>
        </div>
        <div class="stat-card">
            <h3>Revenue</h3>
            <p class="stat-number">Rs. 45,200</p>
        </div>
        <div class="stat-card">
            <h3>New Customers</h3>
            <p class="stat-number">12</p>
        </div>
    </div>

    <section class="content-placeholder">
        <div class="empty-state">
            <span class="material-symbols-outlined">construction</span>
            <p>Admin tools are currently under construction.</p>
        </div>
    </section>
</main>

</body>
</html>
