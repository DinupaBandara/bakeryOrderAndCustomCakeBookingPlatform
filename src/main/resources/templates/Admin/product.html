<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Products | BakeNest Admin</title>
    <link rel="stylesheet" th:href="@{/css/admin/product.css}">
    <link rel="stylesheet" th:href="@{/css/admin/fragments/sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/admin/fragments/notification.css}">

    <script th:src="@{/js/admin/sidebar.js}" defer></script>
    <script th:src="@{/js/admin/notification.js}" defer></script>

</head>
<body class="admin-body">

<div th:replace="~{Admin/fragments/sidebar :: admin-sidebar}"></div>

<main class="main-content">
    <header class="top-bar">
        <div class="header-title">
            <h1>Product Inventory</h1>
            <p>Manage your bakery offerings and pricing.</p>
        </div>
        <button class="btn-add-new" onclick="openModal()">
            <span class="material-symbols-outlined">add</span>
            Add New Product
        </button>
    </header>

    <section class="table-container">
        <table class="admin-table">
            <thead>
            <tr>
                <th>Image</th>
                <th>Product Name</th>
                <th>Category</th>
                <th>Price</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <!-- Loop through products from database -->
            <tr th:each="product : ${products}" th:classappend="${!product.available} ? 'out-of-stock'">
                <td>
                    <img th:src="${product.imageUrl}" class="table-img" alt="Product">
                </td>
                <td>
                    <div class="product-info">
                        <span class="p-name" th:text="${product.name}">Heritage Sourdough</span>
                    </div>
                </td>
                <td><span class="category-pill" th:text="${product.category}">Sourdough</span></td>
                <td th:text="'Rs. ' + ${#numbers.formatDecimal(product.price, 1, 'COMMA', 2, 'POINT')}">Rs. 1,250</td>
                <td>
                    <div class="action-btns">
                        <!-- Availability Toggle Form -->
                        <form th:action="@{/admin/products/toggle-availability/{id}(id=${product.id})}" method="post"
                              style="display:inline;">
                            <button type="submit"
                                    class="icon-btn toggle"
                                    th:classappend="${product.available} ? 'status-on' : 'status-off'"
                                    th:title="${product.available} ? 'Mark as Out of Stock' : 'Mark as Available'">
                                <span class="material-symbols-outlined">[[${product.available ? 'toggle_on' : 'toggle_off'}]]</span>
                            </button>
                        </form>
                        <button class="icon-btn edit"
                                th:onclick="openEditModal([[${product.id}]], [[${product.name}]], [[${product.category}]], [[${product.price}]], [[${product.imageUrl}]], [[${product.description}]])">
                            <span class="material-symbols-outlined">edit</span>
                        </button>
                        <!-- Delete Functionality -->
                        <form th:action="@{/admin/products/delete/{id}(id=${product.id})}"
                              method="post"
                              style="display:inline;"
                              onsubmit="return confirm('Are you sure you want to delete this product? This action cannot be undone.');">
                            <button type="submit" class="icon-btn delete">
                                <span class="material-symbols-outlined">delete</span>
                            </button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </section>
</main>

<!-- Notification Container -->
<div th:replace="~{Admin/fragments/notification :: admin-notification}"></div>

<!-- Add Product Modal -->
<div id="addProductModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Add New Bakery Item</h2>
            <span class="close-modal" onclick="closeModal()">&times;</span>
        </div>
        <form th:action="@{/admin/products/add-product}" method="post" class="modal-form">
            <div class="form-group">
                <label>Product Name</label>
                <input type="text" name="name" placeholder="e.g. Honey Glazed Donut" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Category</label>
                    <select name="category" required>
                        <option value="Bread">Bread</option>
                        <option value="Pastry">Pastry</option>
                        <option value="Beverages">Beverages</option>
                        <option value="Cookies">Cookies</option>
                        <option value="Savoury">Savoury</option>
                        <option value="Cakes">Cakes</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Price (Rs.)</label>
                    <input type="number" step="5" name="price" placeholder="0.00" required>
                </div>
            </div>

            <div class="form-group">
                <label>Image URL</label>
                <input type="url" name="imageUrl" placeholder="https://unsplash.com/..." required>
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea name="description" rows="3" placeholder="Describe the taste and ingredients..." required></textarea>
            </div>

            <button type="submit" class="btn-save">Save Product</button>
        </form>
    </div>
</div>

<!-- Edit Product Modal -->
<div id="editProductModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Edit Bakery Item</h2>
            <span class="close-modal" onclick="closeEditModal()">&times;</span>
        </div>
        <form th:action="@{/admin/products/update-product}" method="post" class="modal-form">
            <!-- Hidden field to keep track of which ID we are editing -->
            <input type="hidden" id="editId" name="id">

            <div class="form-group">
                <label>Product Name</label>
                <input type="text" id="editName" name="name" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Category</label>
                    <select id="editCategory" name="category" required>
                        <option value="Bread">Bread</option>
                        <option value="Pastry">Pastry</option>
                        <option value="Beverages">Beverages</option>
                        <option value="Cookies">Cookies</option>
                        <option value="Savoury">Savoury</option>
                        <option value="Cakes">Cakes</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Price (Rs.)</label>
                    <input type="number" step="5" id="editPrice" name="price" required>
                </div>
            </div>

            <div class="form-group">
                <label>Image URL</label>
                <input type="url" id="editImageUrl" name="imageUrl" required>
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea id="editDescription" name="description" rows="3" required></textarea>
            </div>

            <button type="submit" class="btn-save">Update Product</button>
        </form>
    </div>
</div>

<script>
    const editModal = document.getElementById("editProductModal");

    function openEditModal(id, name, category, price, imageUrl, description) {
        // Populate the form fields with existing product data
        document.getElementById("editId").value = id;
        document.getElementById("editName").value = name;
        document.getElementById("editCategory").value = category;
        document.getElementById("editPrice").value = price;
        document.getElementById("editImageUrl").value = imageUrl;
        document.getElementById("editDescription").value = description;

        editModal.style.display = "block";
    }

    function closeEditModal() {
        editModal.style.display = "none";
    }

    // Close modals if user clicks outside
    window.onclick = function(event) {
        const addModal = document.getElementById("addProductModal");
        if (event.target == addModal) addModal.style.display = "none";
        if (event.target == editModal) editModal.style.display = "none";
    }

    //Add Product Model
    const modal = document.getElementById("addProductModal");

    function openModal() {
        modal.style.display = "block";
    }

    function closeModal() {
        modal.style.display = "none";
    }

    // Close if user clicks outside the box
    window.onclick = function(event) {
        if (event.target == modal) {
            closeModal();
        }
    }
</script>
</body>
</html>
