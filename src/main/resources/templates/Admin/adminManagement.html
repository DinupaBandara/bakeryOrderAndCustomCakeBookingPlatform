<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Management | BakeNest Admin</title>
  <!-- Reusing your existing styles -->
  <link rel="stylesheet" th:href="@{/css/admin/adminManagement.css}">
  <link rel="stylesheet" th:href="@{/css/admin/fragments/sidebar.css}">
  <link rel="stylesheet" th:href="@{/css/admin/fragments/notification.css}">

  <script th:src="@{/js/admin/sidebar.js}" defer></script>
  <script th:src="@{/js/admin/notification.js}" defer></script>

</head>
<body class="admin-body">

<div th:replace="~{Admin/fragments/sidebar :: admin-sidebar}"></div>

<main class="main-content">
  <header class="top-bar">
    <div class="header-title">
      <h1>Administrator Access</h1>
      <p>Manage system access and permissions for your team.</p>
    </div>
    <button class="btn-add-new" onclick="openModal()">
      <span class="material-symbols-outlined">person_add</span>
      Add New Admin
    </button>
  </header>

  <section class="table-container">
    <table class="admin-table">
      <thead>
      <tr>
        <th>Admin Name</th>
        <th>Email Address</th>
        <th>Access Level</th>
        <th>Actions</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="admin : ${admins}">
        <td th:text="${admin.name}">Name</td>
        <td th:text="${admin.email}">Email</td>
        <td>
          <span th:class="${admin.superAdmin} ? 'badge-super' : 'badge-normal'" th:text="${admin.superAdmin} ? 'Super Admin' : 'Staff Admin'"></span>
        </td>
        <td>
          <div class="action-btns">
            <button class="icon-btn edit"
                    th:onclick="openEditModal([[${admin.id}]], [[${admin.name}]], [[${admin.email}]], [[${admin.isSuperAdmin}]])">
              <span class="material-symbols-outlined">edit</span>
            </button>
            <!-- Deletion disabled for Super Admins to prevent lockout -->
            <form th:if="${!admin.superAdmin}" th:action="@{/admin/management/delete/{id}(id=${admin.id})}" method="post">
              <button type="submit" class="icon-btn delete" onclick="return confirm('Remove this admin permanently?')">
                <span class="material-symbols-outlined">delete</span>
              </button>
            </form>
          </div>
        </td>
      </tr>
      </tbody>
    </table>
  </section>
</main>

<!-- Notification Container -->
<div th:replace="~{Admin/fragments/notification :: admin-notification}"></div>

<!-- Add Admin Modal -->
<div id="addAdminModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2>Register New Administrator</h2>
      <span class="close-modal material-symbols-outlined" onclick="closeModal()">close</span>
    </div>
    <form th:action="@{/admin/management/add}" method="post" class="modal-form">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="name" placeholder="e.g., Jennifer Perera" required>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="admin@bakenest.lk" required>
      </div>
      <div class="form-group">
        <label>Initial Password</label>
        <input type="password" name="password" minlength="8" maxlength="20" required>
      </div>
      <div class="checkbox-group">
        <input type="checkbox" name="superAdmin" id="isSuperAdmin" value="true">
        <!-- This hidden field is essential for Spring to handle unchecked boxes -->
        <input type="hidden" name="_superAdmin" value="on">
        <label for="isSuperAdmin">Grant Super Admin Access</label>
      </div>
      <button type="submit" class="btn-save">Create Account</button>
    </form>
  </div>
</div>

<!-- Edit Admin Modal -->
<div id="editAdminModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2>Update Permissions</h2>
      <span class="close-modal material-symbols-outlined" onclick="closeEditModal()">close</span>
    </div>
    <form th:action="@{/admin/management/update}" method="post" class="modal-form">
      <input type="hidden" id="editId" name="id">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="editName" name="name" required>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="editEmail" name="email" required>
      </div>
      <div class="checkbox-group">
        <input type="checkbox" name="superAdmin" id="editIsSuper" value="true">
        <input type="hidden" name="_superAdmin" value="on">
        <label for="editIsSuper">Super Admin Status</label>
      </div>
      <button type="submit" class="btn-save">Save Changes</button>
    </form>
  </div>
</div>

<script>
  const addModal = document.getElementById("addAdminModal");
  const editModal = document.getElementById("editAdminModal");

  function openModal() { addModal.style.display = "block"; }
  function closeModal() { addModal.style.display = "none"; }

  function openEditModal(id, name, email, isSuper) {
    document.getElementById("editId").value = id;
    document.getElementById("editName").value = name;
    document.getElementById("editEmail").value = email;

    const checkbox = document.getElementById("editIsSuper");
    // Ensure isSuper is treated as a boolean
    checkbox.checked = (isSuper === true || isSuper === "true");

    editModal.style.display = "block";
  }

  function closeEditModal() { editModal.style.display = "none"; }

  window.onclick = function(event) {
    if (event.target == addModal) closeModal();
    if (event.target == editModal) closeEditModal();
  }
</script>

</body>
</html>
