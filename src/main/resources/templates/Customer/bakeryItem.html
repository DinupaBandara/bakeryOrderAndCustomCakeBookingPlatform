<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>The Flourished Hearth | Buy Bakery Items</title>
    <link rel="stylesheet" th:href="@{/css/customer/bakeryItem.css}">
    <link rel="stylesheet" th:href="@{/css/customer/fragments/navbar.css}">
</head>
<body>

<div th:replace="~{Customer/fragments/navbar :: header-nav}"></div>

<main class="container">
    <div class="filter-row">
        <div class="filters">
            <!-- Added onclick to filter function -->
            <button class="filter-btn active" onclick="filterSelection('all')">All Creations</button>
            <button class="filter-btn" onclick="filterSelection('Bread')">Breads</button>
            <button class="filter-btn" onclick="filterSelection('Patisserie')">Patisserie</button>
            <button class="filter-btn" onclick="filterSelection('Viennoiserie')">Viennoiserie</button>
            <button class="filter-btn" onclick="filterSelection('Cakes')">Cakes</button>
        </div>

        <div class="back-home-container">
            <a th:href="@{/customer/product}" class="btn-back-round">
                <span class="material-symbols-outlined">arrow_back</span>
                Back to Products
            </a>
        </div>
    </div>

    <div class="product-grid" id="productGrid">
        <!-- Dynamic Loop -->
        <article th:each="product : ${products}"
                 class="product-card"
                 th:data-category="${product.category}"
                 th:if="${product.available}"> <!-- Only show available items -->

            <div class="product-image-wrapper">
                <img th:src="${product.imageUrl}" th:alt="${product.name}" class="product-img"/>
                <div class="card-overlay">
                    <span class="category-tag" th:text="${product.category}">Category</span>
                </div>
                <span class="price-badge" th:text="'Rs. ' + ${#numbers.formatDecimal(product.price, 1, 'COMMA', 2, 'POINT')}">Rs. 0</span>
            </div>

            <div class="product-info">
                <h3 class="product-title" th:text="${product.name}">Product Name</h3>
                <p class="product-description" th:text="${product.description}">Description</p>

                <div class="card-footer">
                    <button class="btn-add-cart">
                        <span class="material-symbols-outlined">shopping_bag</span>
                        Add to Cart
                    </button>
                </div>
            </div>
        </article>
    </div>
</main>
<!-- Footer -->
<footer>
    <div class="footer-container">
        <!-- Brand Info -->
        <p class="footer-copy">
            © 2024 The Artisanal Digital Bakery. Crafted with precision.
        </p>
    </div>
</footer>

<script>
    function filterSelection(category) {
        const cards = document.getElementsByClassName("product-card");
        const buttons = document.getElementsByClassName("filter-btn");

        // Update active button state
        for (let btn of buttons) {
            btn.classList.remove("active");
            if (btn.innerText.includes(category) || (category === 'all' && btn.innerText.includes('All'))) {
                btn.classList.add("active");
            }
        }

        // Filter cards
        for (let card of cards) {
            const productCat = card.getAttribute("data-category");
            if (category === "all" || productCat === category) {
                card.style.display = "flex";
                card.style.animation = "fadeIn 0.5s ease forwards";
            } else {
                card.style.display = "none";
            }
        }
    }
</script>
</body>
</html>
