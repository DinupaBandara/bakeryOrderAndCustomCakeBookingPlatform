<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>The Flourished Hearth | Buy Bakery Items</title>
    <link rel="stylesheet" th:href="@{/css/customer/bakeryItem.css}">
    <link rel="stylesheet" th:href="@{/css/customer/fragments/navbar.css}">
</head>
<body>

<div th:replace="~{Customer/fragments/navbar :: header-nav}"></div>

<main class="container">
    <div class="filter-row">
        <div class="filters">
            <!-- Always show 'All' button -->
            <button class="filter-btn active" onclick="filterSelection('all')">All Creations</button>

            <!-- Use data-category to store the value and pass 'this' to the function -->
            <th:block th:each="cat : ${activeCategories}">
                <button class="filter-btn"
                        th:data-category="${cat}"
                        onclick="filterSelection(this.getAttribute('data-category'))"
                        th:text="${cat}">
                </button>
            </th:block>
        </div>

        <div class="back-home-container">
            <a th:href="@{/customer/product}" class="btn-back-round">
                <span class="material-symbols-outlined">arrow_back</span>
                Back to Products
            </a>
        </div>
    </div>

    <div class="product-grid" id="productGrid">
        <!-- Dynamic Loop -->
        <article th:each="product : ${products}"
                 class="product-card"
                 th:data-category="${product.category}"
                 th:if="${product.available}"> <!-- Only show available items -->

            <div class="product-image-wrapper">
                <img th:src="${product.imageUrl}" th:alt="${product.name}" class="product-img"/>
                <div class="card-overlay">
                    <span class="category-tag" th:text="${product.category}">Category</span>
                </div>
                <span class="price-badge" th:text="'Rs. ' + ${#numbers.formatDecimal(product.price, 1, 'COMMA', 2, 'POINT')}">Rs. 0</span>
            </div>

            <div class="product-info">
                <h3 class="product-title" th:text="${product.name}">Product Name</h3>
                <p class="product-description" th:text="${product.description}">Description</p>

                <div class="card-footer">
                    <!-- Store login status in a data attribute instead of th:onclick -->
                    <button class="btn-add-cart"
                            th:data-logged-in="${user != null}"
                            onclick="handleAddToCart(this)">
                        <span class="material-symbols-outlined">shopping_bag</span>
                        Add to Cart
                    </button>
                </div>
            </div>
        </article>
    </div>
</main>
<!-- Footer -->
<footer>
    <div class="footer-container">
        <!-- Brand Info -->
        <p class="footer-copy">
            © 2024 The Artisanal Digital Bakery. Crafted with precision.
        </p>
    </div>
</footer>

<!-- Login Required Modal -->
<div id="loginPromptModal" class="auth-modal">
    <div class="auth-modal-content">
        <div class="auth-modal-header">
            <span class="material-symbols-outlined warning-icon">lock</span>
            <h2>Sign In Required</h2>
            <p>You need to be logged in to add items to your cart and place orders.</p>
        </div>
        <div class="auth-modal-footer">
            <button class="btn-secondary" onclick="closeLoginModal()">Maybe Later</button>
            <a th:href="@{/login}" class="btn-primary-link">Sign In Now</a>
        </div>
    </div>
</div>

<script>
    function filterSelection(category) {
        const cards = document.getElementsByClassName("product-card");
        const buttons = document.getElementsByClassName("filter-btn");

        // Update active button state
        for (let btn of buttons) {
            btn.classList.remove("active");
            if (btn.innerText.includes(category) || (category === 'all' && btn.innerText.includes('All'))) {
                btn.classList.add("active");
            }
        }

        // Filter cards
        for (let card of cards) {
            const productCat = card.getAttribute("data-category");
            if (category === "all" || productCat === category) {
                card.style.display = "flex";
                card.style.animation = "fadeIn 0.5s ease forwards";
            } else {
                card.style.display = "none";
            }
        }
    }


    //Add to cart Button
    function handleAddToCart(buttonElement) {
        // Note: getAttribute returns a string "true" or "false"
        const isLoggedIn = buttonElement.getAttribute('data-logged-in') === 'true';

        if (!isLoggedIn) {
            // Show the login prompt modal
            const modal = document.getElementById('loginPromptModal');
            if (modal) {
                modal.style.display = 'flex';
            }
        } else {
            // User is logged in, perform add to cart logic
            console.log("Product added to cart successfully!");
        }
    }

    function closeLoginModal() {
        document.getElementById('loginPromptModal').style.display = 'none';
    }

    // Ensure the modal closes when clicking outside the content box
    window.onclick = function(event) {
        const modal = document.getElementById('loginPromptModal');
        if (event.target === modal) {
            closeLoginModal();
        }
    }
</script>
</body>
</html>
